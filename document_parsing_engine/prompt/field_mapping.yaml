# 카페 댓글 생성 프롬프트 템플릿
post_analysis:
  name: "카페 게시글 분석"
  description: "카페 게시글을 분석하여 주제, 감정, 핵심 내용을 파악합니다."
  template: |
    당신은 철강 산업 20년차 전문가 입니다.
    두개의 데이터를 가지고 아래 JSON 형식으로 매핑하여 결과를 제공해주세요.

    데이터1 : 세그먼트-필드 매핑 정보
    {{segment_field_keywords}}

    데이터1 예시) 
    {'quotation_meta': {'document_key': ['견적번호', 'no.', '문서번호', 'document no'],
      'supplier_name': ['공급업체', 'supplier', '판매처', '상호', '회사명'],
      'supplier_contact_person': ['담당자', '작성자', 'contact person'],
      'supplier_phone': ['tel', '전화', '연락처', 'phone', 'fax', 'email', 'e-mail'],
      'supplier_address': ['주소', 'address'],
      'buyer_name': ['수신', '귀중', '貴中', 'buyer', '고객사'],
      'buyer_contact_person': ['수신', '참조', '담당자'],
      'buyer_phone': ['tel', '전화', '연락처'],
      'buyer_address': ['주소', 'address'],
      'validity': ['유효기간', 'validity'],
      'payment_terms': ['지불조건', '결제조건', 'payment'],
      'delivery_terms': ['인도조건', '운송조건', 'delivery', '납기일자']},
    'items': {'rows': {'keywords': [],
      'unit_price': ['단가', 'unit price', 'price'],
      'quantity': ['수량', 'qty', "q'ty", 'quantity'],
      'line_amount': ['금액', 'amount'],
      'material_grade': ['재질', 'grade', 'material', 'description'],
      'thickness': ['두께', 'thickness'],
      'size_text': ['사이즈', 'size', '길이', '폭', 'length'],
      'spec_text': ['규격', 'spec', 'maker', '메이커', 'description', 'material'],
      'vat': ['부가세', 'vat', '세액']},
      'totals': {'keywords': [],
      'total_amount': ['합계', '총액', '부가세', 'vat', '합계금액'],
      'supply_amount': ['공급가액', '공급가', 'supply amount', '소계']}},
    'remarks': {'raw_text': ['특기사항', '비고', 'remark', 'remarks', 'note'],
      'extracted_conditions': ['생산불가', '대체견적', '수급불가', '조건']}
    }

    
    데이터2 : 문서 데이터 (layout parsing 결과)
    {{segment_data}}

    매핑 프로세스:
    1. 데이터1의 key와 데이터2의 key
    2. 감정 (emotion): 작성자의 감정 상태 (긍정적/부정적/중립적)
    3. 핵심 내용 (key_content): 게시글의 핵심 내용을 2-3문장으로 요약
    4. 댓글 포인트 (comment_points): 댓글로 반응할 만한 포인트들을 3-5개 나열

    ```json
    {{
      "topic": "주제",
      "emotion": "감정상태",
      "key_content": "핵심 내용 요약",
      "comment_points": ["포인트1", "포인트2", "포인트3"]
    }}
    ```


